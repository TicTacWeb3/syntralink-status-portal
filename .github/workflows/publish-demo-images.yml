name: Publish demo Docker images

on:
  push:
    branches: [main]
    paths:
      - "demos/**"
      - ".github/workflows/publish-demo-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: demos/L-0503-multi-person-hourly-calendar
            image: ghcr.io/tictacweb3/syntralink-l-0503-multi-person-hourly-calendar:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ matrix.image }}
